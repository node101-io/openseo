<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>ZK-SEO Proof</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        :root {
            color-scheme: light dark;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            margin: 0;
            padding: 0;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        main {
            width: min(900px, 92vw);
            background: rgba(15, 23, 42, 0.9);
            border: 1px solid rgba(148, 163, 184, 0.25);
            border-radius: 20px;
            padding: 32px 40px 40px;
            box-shadow: 0 30px 80px rgba(15, 23, 42, 0.5);
        }

        .input-group {
            margin-bottom: 24px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-group label {
            font-size: 14px;
            color: #cbd5f5;
            font-weight: 600;
        }

        .input-group input {
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid rgba(148, 163, 184, 0.3);
            background: rgba(15, 23, 42, 0.65);
            color: #f8fafc;
            font-size: 15px;
        }

        .input-group input:focus {
            outline: none;
            border-color: rgba(96, 165, 250, 0.8);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.25);
        }

        h1 {
            margin-top: 0;
            margin-bottom: 18px;
            font-size: 28px;
        }

        p.description {
            margin: 0 0 24px;
            color: #cbd5f5;
            line-height: 1.5;
        }

        #dropZone {
            border: 2px dashed rgba(96, 165, 250, 0.6);
            border-radius: 16px;
            padding: 48px 30px;
            text-align: center;
            transition: background 0.2s ease, border-color 0.2s ease;
            cursor: pointer;
            background: rgba(30, 41, 59, 0.7);
        }

        #dropZone.hover {
            border-color: rgba(96, 165, 250, 1);
            background: rgba(30, 64, 175, 0.25);
        }

        #dropZone strong {
            display: block;
            font-size: 18px;
            margin-bottom: 8px;
        }

        #status {
            margin-top: 24px;
            font-weight: 600;
            color: #93c5fd;
        }

        #summary {
            margin-top: 28px;
            background: rgba(15, 23, 42, 0.65);
            border-radius: 16px;
            border: 1px solid rgba(148, 163, 184, 0.25);
            padding: 20px 24px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 18px;
        }

        th, td {
            border-bottom: 1px solid rgba(148, 163, 184, 0.2);
            padding: 10px 12px;
            text-align: left;
            font-size: 15px;
        }

        th {
            color: #cbd5f5;
            font-weight: 600;
        }

        tr:last-child td {
            border-bottom: none;
        }

        .tag {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            border-radius: 999px;
            padding: 4px 12px;
            background: rgba(59, 130, 246, 0.15);
            color: #bfdbfe;
            font-size: 13px;
        }

        .tag-badge {
            display: inline-block;
            padding: 2px 8px;
            margin: 2px;
            border-radius: 6px;
            background: rgba(96, 165, 250, 0.2);
            color: #93c5fd;
            font-size: 11px;
            font-weight: 600;
            border: 1px solid rgba(96, 165, 250, 0.3);
        }

        .status-success {
            color: #4ade80;
            font-weight: 600;
        }

        .status-error {
            color: #f87171;
            font-weight: 600;
        }

        .metrics {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            margin-top: 8px;
        }

        .metric {
            flex: 1 1 180px;
            background: rgba(30, 41, 59, 0.8);
            border-radius: 12px;
            padding: 12px 16px;
            border: 1px solid rgba(148, 163, 184, 0.2);
        }

        .metric span {
            display: block;
            font-size: 12px;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            color: #94a3b8;
            margin-bottom: 4px;
        }

        .metric strong {
            font-size: 18px;
            color: #f8fafc;
        }

        @media (max-width: 640px) {
            main {
                padding: 24px;
            }

            #dropZone {
                padding: 36px 20px;
            }
        }
    </style>
</head>
<body>
    <main>
        <h1>ZK-SEO Proof with Merkle Tree</h1>
        <p class="description">
            Convert your HTML into a Merkle Tree and generate ZK proofs using tag-weighted keyword scoring.
        </p>

        <div class="input-group">
            <label for="keywordInput">Keyword to verify</label>
            <input id="keywordInput" type="text" placeholder="e.g. seo" autocomplete="off">
        </div>

        <div id="dropZone">
            <strong>Drop your HTML file here</strong>
            <span>or click to select a file</span>
        </div>
        <input id="fileInput" type="file" accept=".html,text/html" hidden>

        <div id="status"></div>
        <div id="summary" hidden></div>
    </main>

    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const keywordInput = document.getElementById('keywordInput');
        const statusEl = document.getElementById('status');
        const summaryEl = document.getElementById('summary');

        const preventDefaults = (event) => {
            event.preventDefault();
            event.stopPropagation();
        };

        ['dragenter', 'dragover'].forEach(eventName => {
            dropZone.addEventListener(eventName, event => {
                preventDefaults(event);
                dropZone.classList.add('hover');
            });
        });

        ['dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, event => {
                preventDefaults(event);
                dropZone.classList.remove('hover');
            });
        });

        dropZone.addEventListener('click', () => fileInput.click());

        dropZone.addEventListener('drop', event => {
            const file = event.dataTransfer.files[0];
            handleFile(file);
        });

        fileInput.addEventListener('change', event => {
            const file = event.target.files[0];
            handleFile(file);
            fileInput.value = '';
        });

        function handleFile(file) {
            if (!file) {
                return;
            }

            const keyword = keywordInput.value.trim();
            if (!keyword) {
                statusEl.textContent = 'Please enter a keyword to verify before uploading.';
                summaryEl.hidden = true;
                summaryEl.innerHTML = '';
                return;
            }

            const isHtml = file.type === 'text/html' || file.name.toLowerCase().endsWith('.html');
            if (!isHtml) {
                statusEl.textContent = 'Please upload an HTML file only.';
                summaryEl.hidden = true;
                summaryEl.innerHTML = '';
                return;
            }

            uploadFile(file, keyword);
        }

        async function uploadFile(file, keyword) {
            statusEl.textContent = `Proof oluşturuluyor...`;
            summaryEl.hidden = true;
            summaryEl.innerHTML = '';

            const formData = new FormData();
            formData.append('htmlFile', file);
            formData.append('keyword', keyword);

            try {
                const response = await fetch('/api/upload', {
                    method: 'POST',
                    body: formData
                });

                const payload = await response.json();

                if (!response.ok || !payload.success) {
                    throw new Error(payload.error || 'An unexpected error occurred.');
                }
                console.log("response", payload);

                renderSummary(payload);
            } catch (error) {
                console.error('Upload error:', error);
                statusEl.textContent = `Error: ${error.message}`;
                summaryEl.hidden = true;
                summaryEl.innerHTML = '';
            }
        }

        function renderSummary(payload) {
            const summary = payload.summary || payload;
            statusEl.textContent = 'Proof processing finished.';

            const totalScore = summary?.total_weighted_zk_score ?? summary?.total_zk_score ?? 0;
            const documentLength = summary?.document_length ?? 0;
            const merkleNodes = summary?.merkle_tree_stats?.totalNodes ?? 0;
            const merkleRootHash = summary?.merkle_root_hash ?? 'N/A';
            const keywordsProcessed = summary?.keywords_processed ?? summary?.total_words ?? 0;
            const totalOccurrences = summary?.total_occurrences ?? 0;
            const successCount = summary?.successful_proofs ?? 0;
            const failCount = summary?.failed_proofs ?? 0;
            const targetKeywords = summary?.target_keywords ?? (summary?.target_keyword ? [summary.target_keyword] : [keywordInput.value.trim()]);
            const keywordsFound = summary?.keywords_found ?? targetKeywords;
            const keywordsNotFound = summary?.keywords_not_found ?? [];
            const targetKeywordText = Array.isArray(targetKeywords) ? targetKeywords.join(', ') : targetKeywords;
            const durationMs = summary?.processing_time_ms ?? 0;
            const durationText = durationMs ? `${(durationMs / 1000).toFixed(1)} seconds` : 'Unknown';
            
            const treeType = summary?.merkle_tree_type ?? 'teleportation';
            const treeConversionTime = summary?.merkle_tree_conversion_time_ms ?? summary?.performance_metrics?.tree_conversion_time_ms ?? 0;
            const proofGenerationTime = summary?.total_proof_generation_time_ms ?? summary?.performance_metrics?.proof_generation_time_ms ?? 0;
            const verificationTime = summary?.total_verification_time_ms ?? summary?.performance_metrics?.verification_time_ms ?? 0;
            const proofSize = summary?.total_proof_size_bytes ?? summary?.performance_metrics?.proof_size_bytes ?? 0;

            const results = Array.isArray(summary?.results) ? summary.results : [];

            let tableRows = '';

            if (results.length === 0) {
                tableRows = '<tr><td colspan="7">No keywords processed.</td></tr>';
            } else {
                tableRows = results.map(result => {
                    const statusClass = result.success ? 'status-success' : 'status-error';
                    const statusText = result.success ? 'Success' : 'Failed';
                    const detailText = result.success ? (result.output_file || '-') : (result.error || '-');
                    const occurrences = result.occurrences ?? 0;
                    const weightedScore = result.score ?? 0;
                    const verified = result.verified ? '✅' : '❌';
                    
                    const tagDist = result.tagDistribution || {};
                    const tagBadges = Object.entries(tagDist)
                        .map(([tag, count]) => `<span class="tag-badge">${tag}(${count})</span>`)
                        .join(' ');
                        
                    return `
                        <tr>
                            <td><strong>${result.word}</strong></td>
                            <td>${occurrences}</td>
                            <td><strong>${weightedScore}</strong></td>
                            <td style="line-height: 1.8;">${tagBadges || '-'}</td>
                            <td class="${statusClass}">${statusText} ${verified}</td>
                            <td style="font-size: 12px;">${detailText}</td>
                        </tr>
                    `;
                }).join('');
            }

            summaryEl.hidden = false;
            summaryEl.innerHTML = `
                <h2>Proof Summary</h2>
                <div class="metrics">
                    <div class="metric" style="flex: 1 1 100%;">
                        <span>Weighted ZK Score</span>
                        <strong style="font-size: 24px; color: #60a5fa;">${totalScore}</strong>
                    </div>
                    <div class="metric" style="flex: 1 1 100%;">
                        <span>Target Keywords</span>
                        <strong style="color: #60a5fa;">${targetKeywordText}</strong>
                        ${keywordsNotFound.length > 0 ? `<div style="margin-top: 8px; font-size: 12px; color: #f87171;">Not found: ${keywordsNotFound.join(', ')}</div>` : ''}
                    </div>
                    <div class="metric" style="flex: 1 1 100%;">
                        <span>Merkle Tree Type</span>
                        <strong style="color: #a78bfa;">Teleportation Tree</strong>
                    </div>
                    <div class="metric">
                        <span>Tree Conversion Time</span>
                        <strong style="color: #34d399;">${treeConversionTime.toFixed(2)}ms</strong>
                    </div>
                    <div class="metric">
                        <span>Proof Generation Time</span>
                        <strong style="color: #fbbf24;">${proofGenerationTime.toFixed(2)}ms</strong>
                    </div>
                    <div class="metric">
                        <span>Verification Time</span>
                        <strong style="color: #a78bfa;">${verificationTime.toFixed(2)}ms</strong>
                    </div>
                    <div class="metric">
                        <span>Proof Size</span>
                        <strong style="color: #f472b6;">${(proofSize / 1024).toFixed(2)} KB</strong>
                    </div>
                    <div class="metric">
                        <span>Total Occurrences</span>
                        <strong>${totalOccurrences}</strong>
                    </div>
                    <div class="metric">
                        <span>Merkle Tree Nodes</span>
                        <strong>${merkleNodes}</strong>
                    </div>
                    <div class="metric">
                        <span>Document Characters</span>
                        <strong>${documentLength}</strong>
                    </div>
                    <div class="metric">
                        <span>Successful Proofs</span>
                        <strong class="status-success">${successCount}</strong>
                    </div>
                    <div class="metric">
                        <span>Failed Proofs</span>
                        <strong class="status-error">${failCount}</strong>
                    </div>
                    <div class="metric">
                        <span>Total Time</span>
                        <strong>${durationText}</strong>
                    </div>
                    <div class="metric" style="flex: 1 1 100%;">
                        <span> Merkle Root Hash</span>
                        <strong style="font-size: 11px; word-break: break-all;">${merkleRootHash.substring(0, 32)}...</strong>
                    </div>
                </div>

                <h3 style="margin-top: 24px; margin-bottom: 12px; font-size: 18px;">📊 Keyword Details</h3>
                <table>
                    <thead>
                        <tr>
                            <th>Keyword</th>
                            <th>Count</th>
                            <th>Score</th>
                            <th>Tag Distribution</th>
                            <th>Proof</th>
                            <th>Details</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${tableRows}
                    </tbody>
                </table>
            `;
        }

    </script>
</body>
</html>
